# @package _global_

model_name: daml

model:
  freeze_word_embedding: true
  filters_num: 50
  kernel_size: 3
  id_emb_size: 8
  dropout_prob: 0.3
  l2_reg_lambda: 0.0
  attention_chunk_size: 64

training:
  batch: 8
  eval_batch: 128
  epoch: 100
  lr: 0.0001
  weight_decay: 1e-4
  lr_decay: 0.99
  optimizer: Adam

evaluation:
  eval_step: 1
  early_stop_patience: 10
