# @package _global_

model_name: mymodel_v5

model:
  mf_embedding_size: 64
  mlp_embedding_size: 64
  mlp_hidden_size: [64, 32]
  dropout: 0.3

  # Main selective-alignment objective.
  lambda_pair_align: 0.01

  # Make review_shared rating-relevant.
  lambda_shared_rating: 0.01

  # Preserve review semantics and prevent decomposition collapse.
  lambda_reconstruct: 0.05
  lambda_residual_cf_decor: 0.01
  lambda_shared_residual_decor: 0.005
  lambda_gate_balance: 0.001
  lambda_component_var: 0.001

  # Selective gate / variance regularization.
  gate_target: 0.5
  min_component_std: 0.05

  # By default, align only review_shared.
  # Increase this only for an ablation that injects residual into the alignment target.
  orthogonal_residual_weight: 0.0

  temperature: 0.2
  orthogonal_eps: 1e-8
  rating_loss: mse

data:
  type: bert
  load_review_text: false

training:
  lr: 0.001
  batch: 64
  eval_batch: 512
  epoch: 200
  weight_decay: 1e-4
  lr_decay: 0.99
  optimizer: Adam
  grad_clip: 1.0

evaluation:
  eval_step: 1
  early_stop_patience: 10
