# @package _global_

model_name: transnet

data:
  doc_len: 0
  target_doc_len: 0
  word_dim: 50

model:
  num_filters: 100
  kernel_size: 3
  output_embedding_size: 50
  num_transform_layers: 2
  fm_k: 8
  dropout: 0.5
  rating_loss_weight: 1.0
  act_loss_weight: 1.0
  transform_loss_weight: 1.0

training:
  batch: 64
  eval_batch: 256
  epoch: 100
  lr: 0.001
  weight_decay: 1e-4
  lr_decay: 0.99
  optimizer: Adam

evaluation:
  eval_step: 1
  early_stop_patience: 10
