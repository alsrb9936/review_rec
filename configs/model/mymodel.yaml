# @package _global_
model_name: mymodel

model:
  d_id: 128
  d_model: 128
  d_text: 128
  dropout: 0.6
  num_layers: 2

  # CF-conditioned subspace dimension for each user/item review representation.
  subspace_rank: 4

  # Main pair-level selective alignment:
  # z_shared_pair = user_shared * item_shared  <->  c_ui
  lambda_align: 0.1
  contrast_tau: 0.2

  # Optional side-level alignment:
  # user_shared <-> user_cf, item_shared <-> item_cf
  # Keep 0.0 for the first main experiment.
  lambda_side_align: 0.5


  # review_signal = dot(user_shared, item_shared) / review_score_scale
  # sqrt(128) ≈ 11.3137. This stabilizes the initial dot-product scale.
  review_score_scale: 11.3137

  alpha_init: 0.5
  eps: 1e-8

training:
  batch: 128
  eval_batch: 256
  epoch: 100
  lr: 0.0005
  weight_decay: 1e-5
  lr_decay: 0.99
  optimizer: Adam

evaluation:
  eval_step: 1
  early_stop_patience: 10

data:
  root: /home/infolab/mnt/mingyu/review_rec/dataset
  cache_dir: /home/infolab/mnt/mingyu/review_rec/review4rec/cached
  dataset: Amazon_All_Beauty_18
  language_model: "sentence-transformers/all-MiniLM-L6-v2"
  plm_embedding: true
  embedding_batch_size: 16
  plm_embedding_size: 128
  retain_rui: false
  min_rating: 1.0
  max_rating: 5.0
  load_review_text: true
  stopword_file: /home/infolab/mnt/mingyu/review_rec/review4rec/cached/word2vec/stopwords.txt
  punctuation_file: /home/infolab/mnt/mingyu/review_rec/review4rec/cached/word2vec/punctuations.txt
  separator: "\t"
  columns:
    user_id: user_id
    item_id: item_id
    timestamp: timestamp
    rating: rating
    review_text: reviewText
    review_embedding: review_embedding
  split:
    train_ratio: 0.8
    valid_ratio: 0.1

experiment:
  seed: 42
  device: 0
  save_dir: ./outputs
  log_step: 10

stats:
  num_users: 0
  num_items: 0
