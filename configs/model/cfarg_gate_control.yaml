# @package _global_

defaults:
  - cfarg
  - _self_

model:
  variant: gated
  result_name: CFARG-residual
  score_mode: residual
  review_scale_init: 0.003
  review_scale_trainable: false
  gate_bias_init: -2.0
  gate_reg_weight: 0.01
  detach_cf_for_gate: true
  detach_review_for_gate: true
  use_align_gate: true
  align_temperature: 5.0
  align_threshold: 0.2
