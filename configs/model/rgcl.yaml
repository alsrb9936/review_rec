# @package _global_
model_name: rgcl

model:
  hidden_dim: 64
  dropout: 0.6
  lambda_ed: 0.8
  lambda_nd: 0.6

training:
  # RGCL is full-batch by default in utils.get_dataloader().
  # batch is ignored for rgcl, but kept to preserve the common config schema.
  batch: 0
  full_batch: true
  eval_batch: 512
  epoch: 400
  optimizer: Adam
  lr: 0.01
  weight_decay: 0.0
  lr_decay: 1.0
  grad_clip: 1.0

evaluation:
  eval_step: 1
  early_stop_patience: 50

experiment:
  seed: 42
  device: 0
  save_dir: ./outputs
  log_step: 1

stats:
  num_users: 0
  num_items: 0
