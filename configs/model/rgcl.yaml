# @package _global_
model_name: rgcl

model:
  hidden_dim: 128
  dropout: 0.1
  lambda_ed: 0.8
  lambda_nd: 0.6


training:
  batch: 128
  eval_batch: 512
  epoch: 100
  lr: 0.001
  weight_decay: 0
  lr_decay: 0
  optimizer: Adam

evaluation:
  eval_step: 1
  early_stop_patience: 10

experiment:
  seed: 42
  device: 0
  save_dir: ./outputs
  log_step: 10

stats:
  num_users: 0
  num_items: 0