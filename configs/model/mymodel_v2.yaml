# @package _global_
model_name: mymodel

model:
  # Graph/CF representation dimension.
  d_id: 64

  # Hidden dimension used inside prediction/projection MLPs.
  d_model: 64

  # Review-side representation dimension after PLM embedding projection.
  d_text: 128

  # Pair representation dimension for cf_pair and review_pair.
  # Keeping this equal to d_text is simple and stable.
  d_pair: 128

  dropout: 0.5
  num_layers: 2

  # CF-conditioned subspace dimension for each user/item review representation.
  # Must satisfy 1 <= subspace_rank <= d_text.
  subspace_rank: 4

  # Main pair-level contrastive alignment:
  # review_pair <-> cf_pair
  # Recommended first setting: 0.01 ~ 0.05.
  lambda_pair_align: 0

  # Optional side-level alignment:
  # user_shared <-> user_cf, item_shared <-> item_cf
  # Keep 0.0 for the first main experiment. Try 0.001 ~ 0.01 later.
  lambda_side_align: 0

  contrast_tau: 0.2
  eps: 1e-8

training:
  batch: 128
  eval_batch: 256
  epoch: 100
  lr: 0.0005
  weight_decay: 1e-5
  lr_decay: 0.99
  optimizer: Adam

evaluation:
  eval_step: 1
  early_stop_patience: 10

data:
  root: /home/infolab/mnt/mingyu/review_rec/dataset
  cache_dir: /home/infolab/mnt/mingyu/review_rec/review4rec/cached
  dataset: Amazon_All_Beauty_18
  language_model: "sentence-transformers/all-MiniLM-L6-v2"
  plm_embedding: true
  embedding_batch_size: 16
  plm_embedding_size: 384
  retain_rui: false
  min_rating: 1.0
  max_rating: 5.0
  load_review_text: true
  stopword_file: /home/infolab/mnt/mingyu/review_rec/review4rec/cached/word2vec/stopwords.txt
  punctuation_file: /home/infolab/mnt/mingyu/review_rec/review4rec/cached/word2vec/punctuations.txt
  separator: "\t"
  columns:
    user_id: user_id
    item_id: item_id
    timestamp: timestamp
    rating: rating
    review_text: reviewText
    review_embedding: review_embedding
  split:
    train_ratio: 0.8
    valid_ratio: 0.1

experiment:
  seed: 42
  device: 0
  save_dir: ./outputs
  log_step: 10

stats:
  num_users: 0
  num_items: 0
