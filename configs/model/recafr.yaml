# @package _global_

model_name: recafr

model:
  embedding_dim: 32
  num_layers: 2
  keep_rate: 0.8
  reg_weight: 1.0e-7
  kd_weight: 1.0e-2
  kd_temperature: 0.2
  user_profile_views:
    - user_review_emb_s1.npy
    - user_review_emb_s2.npy
  item_profile_views:
    - item_review_emb_s1.npy
    - item_review_emb_s2.npy

data:
  dataset: Amazon_Office_Products_14
  type: bert

training:
  lr: 0.001
  batch: 256
  eval_batch: 256
  epoch: 3000
  weight_decay: 1e-4
  lr_decay: 1.0
  optimizer: Adam

evaluation:
  eval_step: 1
  early_stop_patience: 15
