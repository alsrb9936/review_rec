# @package _global_

defaults:
  - _self_
  - model: neumf

hydra:
  run:
    dir: .
  output_subdir: null

training:
  batch: 256
  eval_batch: 512
  epoch: 100
  lr: 0.001
  weight_decay: 0.0
  lr_decay: 0.99
  optimizer: Adam

evaluation:
  eval_step: 1
  early_stop_patience: 10

data:
  root: /home/infolab/mnt/mingyu/review_rec/dataset
  cache_dir: /home/infolab/mnt/mingyu/review_rec/cached
  dataset: Amazon_All_Beauty_18
  interaction_file: null
  review_file: null
  separator: "\t"
  columns:
    user_id: user_id
    item_id: item_id
    timestamp: timestamp
    rating: rating
    review_text: reviewText
    review_embedding: review_embedding
  split:
    train_ratio: 0.8
    valid_ratio: 0.1
  load_review_text: false

hidden_dim: 64
num_layers: 2
dropout: 0.1

experiment:
  seed: 42
  device: 0
  save_dir: ./outputs
  log_step: 10

stats:
  num_users: 0
  num_items: 0
